<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chat System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-4">
                <h3>Chat Rooms</h3>
                <ul id="chatRooms" class="list-group"></ul>
            </div>
            <div class="col-8">
                <div id="chatArea" style="display:none;">
                    <h4 id="chatTitle"></h4>
                    <div id="messages" class="border p-2" style="height:400px;overflow-y:auto;"></div>
                    <input id="messageInput" class="form-control mt-2" placeholder="Type message..."
                        onkeyup="handleTyping()">
                    <button class="btn btn-primary mt-2" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.8.1/dist/socket.io.min.js"></script>
    <script src="./js/chat.js"></script>
</body>

</html>
