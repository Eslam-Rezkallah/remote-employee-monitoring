<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a1d27;
            border: 1px solid #2d3748;
            border-radius: 16px;
        }

        .card-title {
            color: #7c6af7;
        }

        .btn-primary {
            background: #7c6af7;
            border: none;
        }

        .btn-primary:hover {
            background: #6a55f0;
        }

        .form-control {
            background: #0f1117;
            border: 1px solid #2d3748;
            color: #fff;
        }

        .form-control:focus {
            background: #0f1117;
            border-color: #7c6af7;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(124, 106, 247, .25);
        }

        #errorMsg {
            display: none;
        }
    </style>
</head>

<body>
    <div class="card p-4" style="width: 400px;">
        <h2 class="card-title text-center mb-4">💬 Chat App</h2>

        <div id="errorMsg" class="alert alert-danger" role="alert"></div>

        <div class="mb-3">
            <label class="form-label text-secondary">Email</label>
            <input id="email" type="email" class="form-control" placeholder="user@example.com" />
        </div>
        <div class="mb-3">
            <label class="form-label text-secondary">Password</label>
            <input id="password" type="password" class="form-control" placeholder="Password@123" />
        </div>
        <button id="loginBtn" class="btn btn-primary w-100 mt-2">Sign In</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const BASE_URL = "http://localhost:8000";

        document.getElementById("loginBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("errorMsg");
            const btn = document.getElementById("loginBtn");

            if (!email || !password) {
                errorMsg.textContent = "Please fill in all fields.";
                errorMsg.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Signing in...";
            errorMsg.style.display = "none";

            try {
                const res = await axios.post(`${BASE_URL}/auth/login`, { email, password });

                // ── الـ token ممكن يكون في res.data.token أو res.data.data.accessToken
                // عدّل السطر ده حسب response الـ auth بتاعك
                const token = res.data?.token || res.data?.data?.accessToken || res.data?.data?.token;

                if (!token) throw new Error("Token not found in response");

                localStorage.setItem("token", `Bearer ${token}`);
                localStorage.setItem("userId", res.data?.data?.user?._id || "");
                localStorage.setItem("username", res.data?.data?.user?.username || "User");

                window.location.href = "index.html";

            } catch (err) {
                const msg = err.response?.data?.message || err.message || "Login failed";
                errorMsg.textContent = msg;
                errorMsg.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Sign In";
            }
        });

        // Press Enter to login
        document.getElementById("password").addEventListener("keydown", (e) => {
            if (e.key === "Enter") document.getElementById("loginBtn").click();
        });
    </script>
</body>

</html>
