<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f1117;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top Bar ── */
        #topBar {
            background: #1a1d27;
            border-bottom: 1px solid #2d3748;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        #topBar h5 {
            color: #7c6af7;
            margin: 0;
        }

        #currentRoomName {
            color: #a0aec0;
            font-size: 13px;
        }

        /* ✅ Feature 6: Connection status */
        #connectionStatus {
            font-size: 11px;
            margin-left: 8px;
        }

        #logoutBtn {
            background: transparent;
            border: 1px solid #c0392b;
            color: #c0392b;
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        #logoutBtn:hover {
            background: #c0392b;
            color: #fff;
        }

        /* ── Layout ── */
        #layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 280px;
            background: #1a1d27;
            border-right: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
        }

        #sidebarTabs {
            display: flex;
            border-bottom: 1px solid #2d3748;
        }

        .sideTab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            color: #718096;
            border: none;
            background: transparent;
        }

        .sideTab.active {
            color: #7c6af7;
            border-bottom: 2px solid #7c6af7;
        }

        #sidebarSearch {
            padding: 10px;
        }

        #sidebarSearch input {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: #fff;
            padding: 6px 10px;
            font-size: 13px;
        }

        #sidebarSearch input:focus {
            outline: none;
            border-color: #7c6af7;
        }

        #roomList {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .roomItem {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background .2s;
        }

        .roomItem:hover {
            background: #252836;
        }

        .roomItem.active {
            background: #2d2f45;
        }

        .roomAvatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #7c6af7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            font-size: 16px;
            flex-shrink: 0;
        }

        .roomAvatar img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .roomInfo {
            overflow: hidden;
            flex: 1;
        }

        .roomName {
            font-weight: 600;
            font-size: 14px;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .roomPreview {
            font-size: 12px;
            color: #718096;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ✅ Feature 4: Unread badge */
        .roomBadge {
            background: #7c6af7;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        #createDMBtn {
            margin: 10px;
            padding: 8px;
            border-radius: 8px;
            background: #252836;
            border: 1px dashed #2d3748;
            color: #7c6af7;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
        }

        #createDMBtn:hover {
            background: #2d2f45;
        }

        /* ── Chat Area ── */
        #chatArea {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chatHeader {
            background: #1a1d27;
            border-bottom: 1px solid #2d3748;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #chatHeaderAvatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #7c6af7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
        }

        #chatHeaderInfo h6 {
            margin: 0;
            font-size: 15px;
            color: #e2e8f0;
        }

        #chatHeaderInfo small {
            color: #718096;
            font-size: 12px;
        }

        #typingIndicator {
            font-size: 12px;
            color: #7c6af7;
            min-height: 16px;
            padding: 0 20px;
        }

        /* ✅ Feature 1: Message search bar */
        #msgSearchContainer {
            display: none;
            padding: 8px 20px;
            background: #1a1d27;
            border-bottom: 1px solid #2d3748;
            position: relative;
        }

        #msgSearchInput {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: #fff;
            padding: 6px 12px;
            font-size: 13px;
        }

        #msgSearchInput:focus {
            outline: none;
            border-color: #7c6af7;
        }

        #msgSearchInput::placeholder {
            color: #4a5568;
        }

        #searchResults {
            display: none;
            position: absolute;
            top: 100%;
            left: 20px;
            right: 20px;
            background: #1a1d27;
            border: 1px solid #2d3748;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
        }

        .searchResultItem {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #2d3748;
        }

        .searchResultItem:hover {
            background: #252836;
        }

        .searchResultItem:last-child {
            border-bottom: none;
        }

        /* ── Messages ── */
        #messageList {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msgRow {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 70%;
        }

        .msgRow.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msgRow.theirs {
            align-self: flex-start;
        }

        .msgAvatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            flex-shrink: 0;
        }

        .msgAvatar img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }

        .msgBubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            max-width: 100%;
            word-break: break-word;
        }

        .mine .msgBubble {
            background: #7c6af7;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .theirs .msgBubble {
            background: #252836;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .msgMeta {
            font-size: 10px;
            color: #718096;
            margin-top: 4px;
            text-align: right;
        }

        .mine .msgMeta {
            text-align: right;
        }

        .theirs .msgMeta {
            text-align: left;
        }

        .msgSender {
            font-size: 11px;
            color: #7c6af7;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .replyBubble {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #7c6af7;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #a0aec0;
        }

        .msgReactions {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .reactionChip {
            background: #1a1d27;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .reactionChip:hover {
            background: #252836;
        }

        .deletedMsg {
            color: #718096;
            font-style: italic;
            font-size: 13px;
        }

        .editedTag {
            font-size: 10px;
            color: #a0aec0;
            margin-left: 4px;
        }

        /* ✅ Feature 7: Checkmarks */
        .checkmark {
            margin-left: 4px;
            font-size: 10px;
        }

        /* ── Reply Preview ── */
        #replyPreview {
            display: none;
            background: #252836;
            border-left: 3px solid #7c6af7;
            margin: 0 20px 8px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #a0aec0;
            align-items: center;
            justify-content: space-between;
        }

        #replyPreview:not(.hidden) {
            display: flex;
        }

        #clearReply {
            background: transparent;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 16px;
        }

        /* ✅ Feature 2: Upload progress bar */
        #uploadProgress {
            display: none;
            margin: 0 20px 8px;
            background: #252836;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
        }

        #uploadProgressBar {
            height: 4px;
            background: #2d3748;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }

        #uploadProgressFill {
            height: 100%;
            background: #7c6af7;
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        #uploadProgressText {
            color: #a0aec0;
        }

        /* ── Input Bar ── */
        #inputBar {
            background: #1a1d27;
            border-top: 1px solid #2d3748;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ✅ Feature 2: File upload button */
        #fileUploadBtn {
            background: transparent;
            border: 1px solid #2d3748;
            border-radius: 10px;
            color: #718096;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #fileUploadBtn:hover {
            color: #7c6af7;
            border-color: #7c6af7;
        }

        #msgInput {
            flex: 1;
            background: #252836;
            border: 1px solid #2d3748;
            border-radius: 12px;
            color: #fff;
            padding: 10px 16px;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 120px;
        }

        #msgInput:focus {
            border-color: #7c6af7;
        }

        #sendBtn {
            background: #7c6af7;
            border: none;
            border-radius: 12px;
            color: #fff;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 16px;
        }

        #sendBtn:hover {
            background: #6a55f0;
        }

        #sendBtn:disabled {
            background: #2d3748;
            cursor: not-allowed;
        }

        /* ── No Room ── */
        #noRoom {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4a5568;
        }

        #noRoom h3 {
            color: #4a5568;
            margin-top: 16px;
        }

        /* ── Modal ── */
        .modal-content {
            background: #1a1d27;
            border: 1px solid #2d3748;
            color: #e2e8f0;
        }

        .modal-header {
            border-bottom: 1px solid #2d3748;
        }

        .modal-footer {
            border-top: 1px solid #2d3748;
        }

        #userSearchInput {
            background: #0f1117;
            border: 1px solid #2d3748;
            color: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            width: 100%;
        }

        #userSearchInput:focus {
            outline: none;
            border-color: #7c6af7;
        }

        #userSearchResults {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .userItem {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .userItem:hover {
            background: #252836;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 10px;
        }

        /* ── Emoji Picker ── */
        .emojiBar {
            display: flex;
            gap: 6px;
            padding: 6px 12px;
            background: #252836;
            border-radius: 10px;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 20px rgba(0, 0, 0, .4);
            z-index: 100;
        }

        .emojiBar span {
            font-size: 20px;
            cursor: pointer;
        }

        .emojiBar span:hover {
            transform: scale(1.3);
        }
    </style>
</head>

<body>

    <!-- ── Top Bar ── -->
    <div id="topBar">
        <h5>💬 Chat App</h5>
        <span id="currentRoomName">Select a room to start chatting</span>
        <!-- ✅ Feature 6: Connection status indicator -->
        <span id="connectionStatus"></span>
        <div style="flex:1;"></div>
        <button id="logoutBtn">Logout</button>
    </div>

    <!-- ── Layout ── -->
    <div id="layout">

        <!-- ── Sidebar ── -->
        <div id="sidebar">
            <div id="sidebarTabs">
                <button class="sideTab active" onclick="switchTab('all', event)">All</button>
                <button class="sideTab" onclick="switchTab('direct', event)">DMs</button>
                <button class="sideTab" onclick="switchTab('channel', event)">Channels</button>
                <button class="sideTab" onclick="switchTab('group', event)">Groups</button>
            </div>
            <div id="sidebarSearch">
                <input type="text" id="searchInput" placeholder="Search rooms..." oninput="filterRooms(this.value)" />
            </div>
            <div id="roomList">
                <div style="text-align:center; color:#718096; padding:20px; font-size:13px;">Loading rooms...</div>
            </div>
            <div id="createDMBtn" onclick="openNewDMModal()">+ New Direct Message</div>
        </div>

        <!-- ── Chat Area ── -->
        <div id="chatArea" style="display:none; flex-direction:column; flex:1;">
            <div id="chatHeader">
                <div id="chatHeaderAvatar">?</div>
                <div id="chatHeaderInfo">
                    <h6 id="chatHeaderName">Room Name</h6>
                    <small id="chatHeaderSub">members</small>
                </div>
            </div>

            <!-- ✅ Feature 1: Message search -->
            <div id="msgSearchContainer">
                <input type="text" id="msgSearchInput" placeholder="🔍 Search messages in this room..." />
                <div id="searchResults"></div>
            </div>

            <div id="typingIndicator"></div>
            <div id="messageList"></div>

            <div id="replyPreview" class="hidden">
                <span id="replyText"></span>
                <button id="clearReply" onclick="clearReply()">✕</button>
            </div>

            <!-- ✅ Feature 2: Upload progress -->
            <div id="uploadProgress">
                <span id="uploadProgressText">Uploading...</span>
                <div id="uploadProgressBar">
                    <div id="uploadProgressFill"></div>
                </div>
            </div>

            <div id="inputBar">
                <!-- ✅ Feature 2: File upload button -->
                <button id="fileUploadBtn" title="Upload file">📎</button>
                <input type="file" id="fileInput" style="display:none;" />
                <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
                <button id="sendBtn">➤</button>
            </div>
        </div>

        <!-- ── No Room ── -->
        <div id="noRoom">
            <div style="font-size:64px;">💬</div>
            <h3>Select a chat to start messaging</h3>
            <p style="font-size:14px; margin-top:8px;">Choose from your rooms on the left</p>
        </div>

    </div>

    <!-- ── New DM Modal ── -->
    <div class="modal fade" id="newDMModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">New Direct Message</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="userSearchInput" type="text" placeholder="Search by username or email..."
                        oninput="searchUsers(this.value)" />
                    <div id="userSearchResults"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Scripts ── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <script src="./js/index.js"></script>
</body>

</html>
